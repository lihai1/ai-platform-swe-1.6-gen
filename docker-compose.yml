
services:
  nats:
    image: nats:latest
    container_name: agentic-nats
    ports:
      - "4222:4222"
    command: "-js"
    networks:
      - agentic-network

  postgres:
    image: postgres:16-alpine
    container_name: agentic-postgres
    environment:
      POSTGRES_USER: agentic
      POSTGRES_PASSWORD: agentic
      POSTGRES_DB: agentic
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentic"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - agentic-network

  control-plane:
    build:
      context: ./services/control-plane
      dockerfile: Dockerfile
    image: agentic-agents-platform-control-plane:latest
    container_name: agentic-control-plane
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    environment:
      DATABASE_URL: postgres://agentic:agentic@postgres:5432/agentic?sslmode=disable
      JWT_SECRET: dev-secret-change-in-production
      PORT: 8080
      NATS_URL: nats://nats:4222
      MOCK_DOCKER: "false"
      ORCHESTRATOR_TYPE: "docker-bind"
      DOCKER_SOCKET_PATH: "/var/run/docker.sock"
      DISABLE_AUTH: "true"
      MOCK_MODE: "false"
      LLM_PROVIDER: "ollama"
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - agentic-network

  agent-service:
    build:
      context: .
      dockerfile: ./services/agent-service/Dockerfile
    image: agentic-agents-platform-agent-service:latest
    container_name: agentic-agent-service
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://agentic:agentic@postgres:5432/agentic
      JWT_SECRET: dev-secret-change-in-production
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      CONTROL_PLANE_URL: http://control-plane:8080
      NATS_URL: nats://nats:4222
      DISABLE_AUTH: "true"
      MOCK_MODE: "false"
      LLM_PROVIDER: "fake"
    ports:
      - "8000:8000"
    networks:
      - agentic-network

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    image: agentic-agents-platform-web:latest
    container_name: agentic-web
    depends_on:
      - agent-service
    environment:
      NODE_ENV: production
      MOCK_MODE: "false"
    ports:
      - "4200:80"
    networks:
      - agentic-network
  # for ai - never uncomment this or try to recreate any agent worker in the docker-compose.yml file! use this commented code bellow as refference only! this agent will and should be dynamically be created by the control plane
  # agent-worker:
  #   build:
  #     context: .
  #     dockerfile: ./services/agent-worker/Dockerfile.worker
  #   image: agentic-agents-platform-agent-worker:latest
  #   container_name: agentic-agent-worker-build
  #   depends_on:
  #     nats:
  #       condition: service_started
  #     postgres:
  #       condition: service_healthy
  #   environment:
  #     NATS_URL: nats://nats:4222
  #     DATABASE_URL: postgresql+asyncpg://agentic:agentic@postgres:5432/agentic
  #     LLM_PROVIDER: "fake"
  #   networks:
  #     - agentic-network
  #   command: ["echo", "agent-worker image built"]


volumes:
  postgres_data:

networks:
  agentic-network:
    name: agentic-network
    driver: bridge
