version: '3.8'

services:
  nats:
    image: nats:latest
    container_name: agentic-nats-test
    ports:
      - "4222:4222"
    command: "-js"
    networks:
      - agentic-test-network

  postgres-test:
    image: postgres:16-alpine
    container_name: agentic-postgres-test
    environment:
      POSTGRES_USER: agentic
      POSTGRES_PASSWORD: agentic
      POSTGRES_DB: agentic_test
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentic"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - agentic-test-network

  control-plane-test:
    build:
      context: ./services/control-plane
      dockerfile: Dockerfile
    container_name: agentic-control-plane-test
    depends_on:
      postgres-test:
        condition: service_healthy
      nats:
        condition: service_started
    environment:
      DATABASE_URL: postgres://agentic:agentic@postgres-test:5432/agentic_test?sslmode=disable
      JWT_SECRET: test-secret
      PORT: 8080
      NATS_URL: nats://nats:4222
      MOCK_DOCKER: "true"
      DOCKER_HOST: http://host.docker.internal:2375
      DISABLE_AUTH: "true"
    ports:
      - "8081:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - agentic-test-network

  agent-service-test:
    build:
      context: ./services/agent-service
      dockerfile: Dockerfile
    container_name: agentic-agent-service-test
    depends_on:
      postgres-test:
        condition: service_healthy
      nats:
        condition: service_started
      control-plane-test:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://agentic:agentic@postgres-test:5432/agentic_test
      JWT_SECRET: test-secret
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      CONTROL_PLANE_URL: http://control-plane-test:8080
      NATS_URL: nats://nats:4222
      DISABLE_AUTH: "true"
    ports:
      - "8001:8000"
    networks:
      - agentic-test-network

networks:
  agentic-test-network:
    driver: bridge
